name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 4'
    - cron: '0 13 * * 0,6'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests beautifulsoup4

      - name: Fetch race entries
        if: github.event.schedule == '0 9 * * 4' || github.event_name == 'workflow_dispatch'
        run: python scripts/auto_fetch.py --mode entries
        continue-on-error: true

      - name: Fetch race results
        if: github.event.schedule == '0 13 * * 0,6' || github.event_name == 'workflow_dispatch'
        run: python scripts/auto_fetch.py --mode results
        continue-on-error: true

      - name: Commit updated JSONs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/reviews/
          git diff --staged --quiet || git commit -m "自動更新: $(date '+%Y-%m-%d %H:%M')"
          git push || true

      - name: Install Node deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
